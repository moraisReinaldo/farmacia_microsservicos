server:
  port: 8083

spring:
  application:
    name: venda-service
  datasource:
    url: jdbc:mysql://localhost:3306/farmacia_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
    username: farmacia
    password: farmacia123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  # RabbitMQ (ativo apenas no profile v2)
  rabbitmq:
    host: localhost
    port: 5672
    username: farmacia
    password: farmacia123

# URLs dos microsserviços (V1 - chamadas REST diretas)
microservicos:
  produto-service:
    url: http://localhost:8081
  cliente-service:
    url: http://localhost:8082
  estoque-service:
    url: http://localhost:8084
  nota-fiscal-service:
    url: http://localhost:8085
  receita-service:
    url: http://localhost:8086
  desconto-service:
    url: http://localhost:8087

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.farmacia.venda: DEBUG
