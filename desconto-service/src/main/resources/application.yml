server:
  port: 8087

spring:
  application:
    name: desconto-service
  datasource:
    url: jdbc:mysql://localhost:3306/farmacia_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
    username: farmacia
    password: farmacia123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

microservicos:
  cliente-service:
