server:
  port: 8088

spring:
  application:
    name: relatorio-service

microservicos:
  venda-service:
    url: http://localhost:8083
  produto-service:
    url: http://localhost:8081
  estoque-service:
    url: http://localhost:8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.farmacia.relatorio: DEBUG
